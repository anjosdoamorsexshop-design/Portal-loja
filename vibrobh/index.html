<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anjos do Amor</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      min-height: 100vh;
      background-color: #7D387D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .logo {
      width: 240px;
      max-width: 65vw;
      margin-bottom: 32px;
    }
    .tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 40px;
      line-height: 1.2;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background-color: #F686BD;
      color: #ffffff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }
    .cta-btn .arrow {
      letter-spacing: 0;
      font-size: 20px;
      line-height: 1;
    }
    .cta-btn:hover { background-color: #E12B8D; transform: translateY(-2px); }
    .cta-btn:active { transform: translateY(0); }
  </style>
</head>
